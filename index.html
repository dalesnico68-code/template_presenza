<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presenze Ufficio</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; color: #1a202c; min-height: 100vh; }

  header {
    background: linear-gradient(135deg, #6a9a1a, #86BC25);
    color: white;
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  header h1 { font-size: 1.4rem; font-weight: 700; }
  header .subtitle { font-size: 0.85rem; opacity: 0.85; margin-top: 2px; }
  .reset-info { font-size: 0.78rem; background: rgba(255,255,255,0.2); padding: 6px 12px; border-radius: 20px; }

  .tabs {
    display: flex;
    background: white;
    border-bottom: 2px solid #e2e8f0;
    padding: 0 32px;
    gap: 4px;
  }
  .tab {
    padding: 14px 24px;
    cursor: pointer;
    border: none;
    background: none;
    font-size: 0.95rem;
    color: #718096;
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
    font-weight: 500;
    transition: all 0.2s;
  }
  .tab.active { color: #6a9a1a; border-bottom-color: #86BC25; }
  .tab:hover:not(.active) { color: #4a5568; }

  .container { max-width: 800px; margin: 32px auto; padding: 0 20px; }

  /* VOTE PAGE */
  .person-selector {
    background: white;
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 24px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  .person-selector h2 { font-size: 1rem; color: #4a5568; margin-bottom: 14px; font-weight: 600; }
  .person-buttons { display: flex; gap: 12px; flex-wrap: wrap; }
  .person-btn {
    padding: 10px 24px;
    border: 2px solid #e2e8f0;
    border-radius: 8px;
    background: white;
    cursor: pointer;
    font-size: 0.95rem;
    font-weight: 500;
    color: #4a5568;
    transition: all 0.2s;
  }
  .person-btn:hover { border-color: #86BC25; color: #6a9a1a; }
  .person-btn.selected { background: #86BC25; color: white; border-color: #86BC25; }

  .days-card {
    background: white;
    border-radius: 12px;
    padding: 24px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  .days-card h2 { font-size: 1rem; color: #4a5568; margin-bottom: 18px; font-weight: 600; }
  .days-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 24px; }
  .day-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px 8px;
    border: 2px solid #e2e8f0;
    border-radius: 10px;
    cursor: pointer;
    background: white;
    transition: all 0.2s;
    position: relative;
  }
  .day-btn:hover { border-color: #86BC25; background: #f4faeb; }
  .day-btn.selected { border-color: #86BC25; background: #f4faeb; }
  .day-btn.selected::after {
    content: '✓';
    position: absolute;
    top: 6px; right: 8px;
    color: #6a9a1a;
    font-size: 0.8rem;
    font-weight: 700;
  }
  .day-name { font-size: 0.9rem; font-weight: 700; color: #2d3748; }
  .day-date { font-size: 0.75rem; color: #a0aec0; margin-top: 4px; }

  .save-btn {
    width: 100%;
    padding: 14px;
    background: #86BC25;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  .save-btn:hover { background: #6a9a1a; }
  .save-btn:disabled { background: #a0aec0; cursor: not-allowed; }

  .toast {
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #2d3748;
    color: white;
    padding: 12px 24px;
    border-radius: 8px;
    font-size: 0.9rem;
    transition: transform 0.3s;
    z-index: 999;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { background: #276749; }

  .already-voted {
    background: #f4faeb;
    border: 1px solid #c3e07a;
    border-radius: 10px;
    padding: 14px 18px;
    margin-top: 16px;
    font-size: 0.9rem;
    color: #4a7a10;
  }

  /* ADMIN PAGE */
  .week-header {
    background: white;
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 20px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .week-range { font-weight: 700; color: #2d3748; font-size: 1rem; }
  .reset-btn {
    padding: 8px 16px;
    background: #fed7d7;
    color: #c53030;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: 600;
  }
  .reset-btn:hover { background: #feb2b2; }

  .summary-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; margin-bottom: 24px; }
  .day-summary {
    background: white;
    border-radius: 12px;
    padding: 18px 12px;
    text-align: center;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  .day-summary .day-label { font-size: 0.85rem; font-weight: 700; color: #4a5568; margin-bottom: 10px; }
  .count-circle {
    width: 50px; height: 50px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.4rem;
    font-weight: 800;
    margin: 0 auto 10px;
    background: #e2e8f0;
    color: #4a5568;
  }
  .count-circle.has-people { background: #86BC25; color: white; }
  .person-chips { display: flex; flex-direction: column; gap: 4px; }
  .chip {
    font-size: 0.7rem;
    background: #f4faeb;
    color: #6a9a1a;
    padding: 3px 8px;
    border-radius: 20px;
    font-weight: 500;
  }

  .detail-table {
    background: white;
    border-radius: 12px;
    padding: 20px 24px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  .detail-table h3 { font-size: 1rem; font-weight: 700; color: #2d3748; margin-bottom: 16px; }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; font-size: 0.8rem; color: #718096; padding: 8px 12px; border-bottom: 2px solid #e2e8f0; font-weight: 600; }
  td { padding: 10px 12px; border-bottom: 1px solid #f7fafc; font-size: 0.9rem; }
  tr:last-child td { border-bottom: none; }
  .no-data { color: #a0aec0; font-style: italic; }
  .dot { display: inline-block; width: 8px; height: 8px; background: #86BC25; border-radius: 50; margin-right: 4px; }
</style>
</head>
<body>

<header>
  <div style="display:flex; align-items:center; gap:16px">
    <img src="https://github.com/dalesnico68-code/template_presenza/blob/main/logo.png" alt="Logo" style="height:48px; width:auto;">
    <div>
      <h1>📅 Presenze Ufficio</h1>
      <div class="subtitle">Settimana corrente</div>
    </div>
  </div>
  <div class="reset-info">🔄 Reset automatico: venerdì ore 11:00</div>
</header>

<div class="tabs">
  <button class="tab active" onclick="showTab('vote')">✏️ Inserisci preferenza</button>
  <button class="tab" onclick="showTab('admin')">📊 Riepilogo</button>
</div>

<div id="tab-vote" class="container">
  <div class="person-selector">
    <h2>👤 Chi sei?</h2>
    <div class="person-buttons">
      <button class="person-btn" onclick="selectPerson('Nicola d\'Alesio')">Nicola d'Alesio</button>
      <button class="person-btn" onclick="selectPerson('Daniele Tacchia')">Daniele Tacchia</button>
      <button class="person-btn" onclick="selectPerson('Benedetta Sorgentone')">Benedetta Sorgentone</button>
      <button class="person-btn" onclick="selectPerson('Daniele Caminiti')">Daniele Caminiti</button>
    </div>
  </div>

  <div class="days-card">
    <h2>📆 Quali giorni verrai in ufficio questa settimana?</h2>
    <div class="days-grid" id="days-grid"></div>
    <div id="already-voted-msg"></div>
    <button class="save-btn" id="save-btn" onclick="saveVote()" disabled>Salva preferenze</button>
  </div>
</div>

<div id="tab-admin" class="container" style="display:none">
  <div class="week-header">
    <div>
      <div class="week-range" id="week-range-label"></div>
      <div style="font-size:0.8rem;color:#718096;margin-top:4px" id="last-reset-label"></div>
    </div>
    <button class="reset-btn" onclick="manualReset()">🗑️ Reset manuale</button>
  </div>
  <div class="summary-grid" id="summary-grid"></div>
  <div class="detail-table">
    <h3>Dettaglio per persona</h3>
    <table id="detail-table">
      <thead><tr>
        <th>Persona</th><th>Lun</th><th>Mar</th><th>Mer</th><th>Gio</th><th>Ven</th>
      </tr></thead>
      <tbody id="detail-body"></tbody>
    </table>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const PEOPLE = ["Nicola d'Alesio", "Daniele Tacchia", "Benedetta Sorgentone", "Daniele Caminiti"];
const DAYS = ['Lunedì','Martedì','Mercoledì','Giovedì','Venerdì'];
const STORAGE_KEY = 'ufficio_presenze_v1';

let selectedPerson = null;
let selectedDays = [];

// ─── Storage helpers ────────────────────────────────────────────────
function getState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : { votes: {}, resetAt: null };
  } catch { return { votes: {}, resetAt: null }; }
}
function saveState(state) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

// ─── Auto-reset logic ────────────────────────────────────────────────
function getNextFridayReset() {
  const now = new Date();
  const day = now.getDay(); // 0=Dom, 5=Ven
  const diff = (5 - day + 7) % 7;
  const next = new Date(now);
  if (diff === 0) {
    // today is friday
    const todayReset = new Date(now);
    todayReset.setHours(11, 0, 0, 0);
    if (now < todayReset) return todayReset;
    // next friday
    next.setDate(now.getDate() + 7);
  } else {
    next.setDate(now.getDate() + diff);
  }
  next.setHours(11, 0, 0, 0);
  return next;
}

function checkAutoReset() {
  const state = getState();
  if (!state.resetAt) {
    state.resetAt = getNextFridayReset().getTime();
    saveState(state);
    return;
  }
  const now = Date.now();
  if (now >= state.resetAt) {
    // reset!
    state.votes = {};
    state.resetAt = getNextFridayReset().getTime();
    saveState(state);
    showToast('✅ Dati resettati automaticamente (venerdì ore 11)', 'success');
  }
}

function manualReset() {
  if (!confirm('Sei sicuro di voler resettare tutti i dati della settimana?')) return;
  const state = getState();
  state.votes = {};
  state.resetAt = getNextFridayReset().getTime();
  saveState(state);
  renderAdmin();
  showToast('✅ Reset completato', 'success');
}

// ─── Week dates ────────────────────────────────────────────────────
function getWeekDates() {
  const today = new Date();
  const day = today.getDay();
  const monday = new Date(today);
  monday.setDate(today.getDate() - ((day + 6) % 7));
  return Array.from({length:5}, (_,i) => {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    return d;
  });
}

// ─── Vote page ────────────────────────────────────────────────────
function selectPerson(name) {
  selectedPerson = name;
  document.querySelectorAll('.person-btn').forEach(b => b.classList.remove('selected'));
  document.querySelectorAll('.person-btn').forEach(b => {
    if (b.textContent.trim() === name) b.classList.add('selected');
  });
  loadPersonVote();
  updateSaveBtn();
}

function loadPersonVote() {
  const state = getState();
  const vote = state.votes[selectedPerson] || [];
  selectedDays = [...vote];
  renderDays();
  showAlreadyVoted(vote.length > 0);
}

function renderDays() {
  const dates = getWeekDates();
  const grid = document.getElementById('days-grid');
  grid.innerHTML = DAYS.map((d,i) => {
    const date = dates[i];
    const dd = date.getDate().toString().padStart(2,'0');
    const mm = (date.getMonth()+1).toString().padStart(2,'0');
    const sel = selectedDays.includes(i) ? 'selected' : '';
    return `<button class="day-btn ${sel}" onclick="toggleDay(${i})">
      <span class="day-name">${d}</span>
      <span class="day-date">${dd}/${mm}</span>
    </button>`;
  }).join('');
}

function toggleDay(i) {
  if (!selectedPerson) { showToast('Prima seleziona il tuo nome!'); return; }
  const idx = selectedDays.indexOf(i);
  if (idx >= 0) selectedDays.splice(idx, 1);
  else selectedDays.push(i);
  renderDays();
  updateSaveBtn();
}

function updateSaveBtn() {
  document.getElementById('save-btn').disabled = !selectedPerson;
}

function showAlreadyVoted(show) {
  const el = document.getElementById('already-voted-msg');
  if (show && selectedPerson) {
    const days = selectedDays.map(i => DAYS[i]).join(', ') || 'nessun giorno';
    el.innerHTML = `<div class="already-voted">✅ Preferenza già salvata per questa settimana: <strong>${days}</strong>. Puoi aggiornare e risalvare.</div>`;
  } else {
    el.innerHTML = '';
  }
}

function saveVote() {
  if (!selectedPerson) return;
  const state = getState();
  state.votes[selectedPerson] = [...selectedDays];
  saveState(state);
  showToast(`✅ Preferenze di ${selectedPerson} salvate!`, 'success');
  showAlreadyVoted(true);
}

// ─── Admin page ────────────────────────────────────────────────────
function renderAdmin() {
  const state = getState();
  const dates = getWeekDates();

  // Week range label
  const fmt = d => `${d.getDate().toString().padStart(2,'0')}/${(d.getMonth()+1).toString().padStart(2,'0')}`;
  document.getElementById('week-range-label').textContent =
    `Settimana ${fmt(dates[0])} – ${fmt(dates[4])}`;

  // Next reset
  const nextReset = state.resetAt ? new Date(state.resetAt) : getNextFridayReset();
  document.getElementById('last-reset-label').textContent =
    `Prossimo reset: venerdì ${fmt(nextReset)} ore 11:00`;

  // Summary grid
  const grid = document.getElementById('summary-grid');
  grid.innerHTML = DAYS.map((day, i) => {
    const present = PEOPLE.filter(p => (state.votes[p] || []).includes(i));
    const hasPeople = present.length > 0;
    const chips = present.map(p => {
      const short = p.split(' ')[0];
      return `<span class="chip">${short}</span>`;
    }).join('');
    return `<div class="day-summary">
      <div class="day-label">${day}</div>
      <div class="count-circle ${hasPeople ? 'has-people' : ''}">${present.length}</div>
      <div class="person-chips">${chips || '<span style="color:#a0aec0;font-size:0.75rem">–</span>'}</div>
    </div>`;
  }).join('');

  // Detail table
  const tbody = document.getElementById('detail-body');
  if (Object.keys(state.votes).length === 0) {
    tbody.innerHTML = `<tr><td colspan="6" class="no-data">Nessuna preferenza inserita questa settimana.</td></tr>`;
    return;
  }
  tbody.innerHTML = PEOPLE.map(person => {
    const vote = state.votes[person];
    if (!vote) return `<tr><td>${person}</td>${DAYS.map(() => '<td style="color:#a0aec0">–</td>').join('')}</tr>`;
    const cells = DAYS.map((_,i) =>
      vote.includes(i) ? `<td><span class="dot"></span>✓</td>` : `<td style="color:#e2e8f0">✗</td>`
    ).join('');
    return `<tr><td><strong>${person}</strong></td>${cells}</tr>`;
  }).join('');
}

// ─── Tabs ────────────────────────────────────────────────────────
function showTab(name) {
  document.getElementById('tab-vote').style.display = name === 'vote' ? '' : 'none';
  document.getElementById('tab-admin').style.display = name === 'admin' ? '' : 'none';
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0 && name==='vote') || (i===1 && name==='admin')));
  if (name === 'admin') renderAdmin();
}

// ─── Toast ────────────────────────────────────────────────────────
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' '+type : '');
  setTimeout(() => t.className = 'toast', 3000);
}

// ─── Init ────────────────────────────────────────────────────────
checkAutoReset();
renderDays();
</script>
</body>
</html>
